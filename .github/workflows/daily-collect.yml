name: Daily Glossary Collection

on:
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        source:
          - mesh
          - wikidata
          - icd10
          - hcpcs
          - rxnorm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect from ${{ matrix.source }}
        run: python -m collectors.${{ matrix.source }}_run

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.source }}-error-logs
          path: data/logs/

  collect-auth:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: collect
    strategy:
      fail-fast: false
      matrix:
        include:
          - source: icd11
            env: |
              ICD11_CLIENT_ID: ${{ secrets.ICD11_CLIENT_ID }}
              ICD11_CLIENT_SECRET: ${{ secrets.ICD11_CLIENT_SECRET }}
          - source: loinc
            env: |
              LOINC_USERNAME: ${{ secrets.LOINC_USERNAME }}
              LOINC_PASSWORD: ${{ secrets.LOINC_PASSWORD }}
          - source: umls
            env: |
              UMLS_API_KEY: ${{ secrets.UMLS_API_KEY }}
          - source: snomed
            env: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect from ${{ matrix.source }}
        env: ${{ matrix.env }}
        run: python -m collectors.${{ matrix.source }}_run

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.source }}-error-logs
          path: data/logs/

  collect-file-based:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: collect
    strategy:
      fail-fast: false
      matrix:
        source: [atc, ichi, icf, custom_glossaries]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect from ${{ matrix.source }}
        run: python -m collectors.${{ matrix.source }}_run

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.source }}-error-logs
          path: data/logs/

  collect-telegram:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: collect
    if: ${{ secrets.TELEGRAM_API_ID != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore Telegram session
        run: |
          echo "${{ secrets.TELEGRAM_SESSION_B64 }}" | base64 -d > glossary_session.session 2>/dev/null || true

      - name: Collect from Telegram
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_PHONE: ${{ secrets.TELEGRAM_PHONE }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
        run: python -m collectors.telegram_run

  merge-and-push:
    runs-on: ubuntu-latest
    needs: [collect, collect-auth, collect-file-based]
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Merge all sources
        run: python -m processors.merge_sources

      - name: Commit and push
        run: |
          git config user.name "Glossary Bot"
          git config user.email "bot@example.com"
          git add data/
          git diff --staged --quiet || git commit -m "🤖 تحديث المسارد - $(date +'%Y-%m-%d %H:%M UTC')"
          git push